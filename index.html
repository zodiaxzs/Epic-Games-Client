<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Credentials</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f9; margin: 0; }
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 320px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background: #218838; }
        #message { margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Submit Data</h2>
    <form id="credentialsForm">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="name@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Enter password">
        </div>
        <button type="submit">Send to Server</button>
    </form>
    <div id="message"></div>
</div>

<script>
document.getElementById('credentialsForm').addEventListener('submit', async (event) => {
    // Prevent the default browser page reload on form submission
    event.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const messageDiv = document.getElementById('message');

    try {
        // Send a POST request to the server endpoint
        const response = await fetch('/api/submit', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            // Convert data to JSON string format
            body: JSON.stringify({ email, password })
        });

        const result = await response.text();
        
        if (response.ok) {
            messageDiv.style.color = 'green';
            messageDiv.textContent = result;
        } else {
            messageDiv.style.color = 'red';
            messageDiv.textContent = result;
        }
    } catch (error) {
        messageDiv.style.color = 'red';
        messageDiv.textContent = 'Could not connect to the server.';
    }
});
</script>

</body>
</html>
